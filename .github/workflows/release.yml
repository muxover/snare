name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build -v -o snare-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -v -o snare-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -v -o snare-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -v -o snare-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: release-notes/${{ github.ref_name }}.md
          files: |
            snare-linux-amd64
            snare-darwin-amd64
            snare-darwin-arm64
            snare-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
